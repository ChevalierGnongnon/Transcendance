
services:
  nginx:
    build:
      context: ../..
      dockerfile: srcs/docker/nginx/Dockerfile
    image: nginx:transcendance
    container_name: nginx
    ports:
      - "8443:443"
    networks:
      - transcendance
    env_file:
      - ./secrets/.env
    restart: unless-stopped

  reactjs:
    build:
      context: ../..
      dockerfile: srcs/docker/reactjs/Dockerfile
    container_name: reactjs
    volumes:
      - ../frontend:/app
      - react_node_modules:/app/node_modules
    networks:
      - transcendance
    restart: unless-stopped
    env_file: secrets/.env

  expressjs:
    build:
      context: ../..
      dockerfile: srcs/docker/expressjs/Dockerfile
    container_name: expressjs
    volumes:
      - ../backend:/app
      - express_node_modules:/app/node_modules
    networks:
      - transcendance
    restart: unless-stopped
    env_file: secrets/.env

networks:
  transcendance:

volumes:
  react_node_modules:
  express_node_modules: