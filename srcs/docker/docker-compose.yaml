
services:
  nginx:
    build:
      context: ../..
      dockerfile: srcs/docker/nginx/Dockerfile
    image: nginx:transcendance
    container_name: nginx
    ports:
      - "8443:443"
    networks:
      - transcendance
    env_file:
      - ./secrets/.env
    restart: unless-stopped
    depends_on:
      expressjs: 
        condition: service_healthy
      reactjs:
        condition: service_healthy
  reactjs:
    build:
      context: ../..
      dockerfile: srcs/docker/reactjs/Dockerfile
    image: reactjs:transcendance
    container_name: reactjs
    volumes:
      - ../frontend:/app
      - react_node_modules:/app/node_modules
    networks:
      - transcendance
    restart: unless-stopped
    env_file: secrets/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 5s
      timeout: 3s
      retries: 5

  expressjs:
    build:
      context: ../..
      dockerfile: srcs/docker/expressjs/Dockerfile
    image: expressjs:transcendance
    container_name: expressjs
    volumes:
      - ../backend:/app
      - express_node_modules:/app/node_modules
    networks:
      - transcendance
    restart: unless-stopped
    env_file: secrets/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  transcendance:

volumes:
  react_node_modules:
  express_node_modules: