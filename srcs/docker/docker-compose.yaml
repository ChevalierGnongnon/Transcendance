services:
  reactjs:
    build:
      context: ../..
      dockerfile: srcs/docker/reactjs/Dockerfile
    container_name: reactjs
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - react_node_modules:/app/node_modules
    networks:
      - transcendance
    restart: unless-stopped
    env_file: secrets/.env
  laravel:
    build:
      context: ../..
      dockerfile: srcs/docker/laravel/Dockerfile
      container_name: laravel
      volumes:
        - laravel_storage:/var/www/html/storage/app/public
      networks:
        - transcendance
      depends_on:
        mysql:
          condition: service_healthy
      restart: unless-stopped
      healthcheck:
       test: ["CMD", "php", "artisan", "about"]
       interval: 10s
       timeout: 5s
       retries: 10
       start_period: 60s
      env_file: secrets/.env




networks:
  transcendance:

volumes:
  react_node_modules:
  laravel_storage:
  